services:
  rover:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        L4T_VERSION_MAJOR: 36 # jetpack version 36.4.0 
        L4T_VERSION_MINOR: 4
        L4T_VERSION_PATCH: 0
        ROS2_WRAPPER_FOLDER: /home/ros2_EB_ws
    container_name: openeb
    volumes:
      - ../src:/home/workspace/src
      - /tmp/argus_socket:/tmp/argus_socket
      - /lib/modules/5.15.148-tegra:/lib/modules/5.15.148-tegra
      - /dev/:/dev/
      - /usr/local/zed/resources/:/usr/local/zed/resources/
      - /tmp/.X11-unix/:/tmp/.X11-unix
      - /home/robotlab/.Xauthority:/root/.Xauthority:roo
      - /dev/shm:/dev/shm
    working_dir: /home/workspace
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=:10.0
      - XAUTHORITY=/root/.Xauthority
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
    network_mode: host
    privileged: true
    runtime: nvidia
    devices:
      - /dev:/dev
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
      - /dev/bus/usb:/dev/bus/usb
